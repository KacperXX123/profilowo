<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zadanie 2 – Tailwind Header</title>
<!-- Tailwind CSS v2 przez CDN – nie wymaga instalacji -->
<link href="https://unpkg.com/tailwindcss@2/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans">

<!-- NAGŁÓWEK (HEADER) -->
<header class="bg-purple-900 text-white shadow-md">
<div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">

<!-- Logo -->
<div class="text-xl font-bold">cus</div>

<!-- Menu nawigacyjne -->
<nav class="space-x-6 hidden md:flex">
<!-- hidden md:flex = ukryj na telefonie, pokaż na większych ekranach -->
<a href="#" class="hover:text-blue-300 transition">Strona główna</a>
<a href="#" class="hover:text-blue-300 transition">O mnie</a>
<a href="#" class="hover:text-blue-300 transition">Kontakt</a>
<a href="#" class="hover:text-blue-300 transition">E-mail</a>

</nav>

<!-- Przycisk hamburger (tylko na telefonie) -->
<button class="bg-yellow-400 text-gray-900 md:hidden text-2xl">&#9776;</button>
</div>
</header>

<!-- SEKCJA HERO -->
<section class="bg-blue-800 text-white py-32 px-4 text-center">
<h1 class="text-4xl md:text-6xl font-bold mb-4">
Witaj na mojej stronie!
</h1>
<p class="text-lg md:text-xl text-blue-200 mb-8 max-w-2xl mx-auto">
To jest sekcja hero – pierwszy widok który użytkownik widzi po wejściu na stronę.
Powinna być przyciągająca uwagę i jasno komunikować cel strony.
</p>
<a href="#"
class="bg-white text-blue-900 font-semibold px-8 py-3 rounded-full
hover:bg-blue-100 transition inline-block">
Dowiedz się więcej
</a>
</section>

<!-- PRZYKŁADOWA TREŚĆ POD HERO -->
<main class="max-w-5xl mx-auto px-4 py-16">
<p class="text-gray-500 text-center">Tu będzie reszta strony...</p>
</main>

</body>
</html>
